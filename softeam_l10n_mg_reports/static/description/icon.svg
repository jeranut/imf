<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <!-- Madagascar flag base (proportions adapted to square icon) -->
  <rect x="0" y="0" width="93.33" height="280" fill="#FFFFFF"/>
  <rect x="93.33" y="0" width="186.67" height="140" fill="#FC3D32"/>
  <rect x="93.33" y="140" width="186.67" height="140" fill="#007E3A"/>

  <!-- Bar chart overlay (bottom-right) to differentiate from chart-of-accounts module -->
  <g transform="translate(155, 175)">
    <!-- Card background for legibility -->
    <rect x="-8" y="-8" width="116" height="100" rx="10" ry="10" fill="#FFFFFF" opacity="0.92"/>
    <!-- Bars (ascending) -->
    <rect x="2"  y="55"  width="18" height="35" rx="2" fill="#714B67"/>
    <rect x="26" y="40"  width="18" height="50" rx="2" fill="#9C6B8E"/>
    <rect x="50" y="25"  width="18" height="65" rx="2" fill="#FC3D32"/>
    <rect x="74" y="10"  width="18" height="80" rx="2" fill="#007E3A"/>
    <!-- Top trend line -->
    <polyline points="11,55 35,40 59,25 83,10" fill="none" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="83" cy="10" r="4" fill="#1E1E1E"/>
  </g>

  <!-- Subtle outer border -->
  <rect x="0.5" y="0.5" width="279" height="279" fill="none" stroke="#1E1E1E" stroke-width="1" stroke-opacity="0.18"/>
</svg>
