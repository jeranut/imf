<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#714B67"/>
      <stop offset="50%" style="stop-color:#875A7B"/>
      <stop offset="100%" style="stop-color:#9C6B8E"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FC3D32"/>
      <stop offset="100%" style="stop-color:#D81E05"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#007E3A"/>
      <stop offset="100%" style="stop-color:#005C2A"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FC3D32"/>
      <stop offset="100%" style="stop-color:#B82A1F"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#33C77E"/>
      <stop offset="100%" style="stop-color:#007E3A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgGrad)"/>
  <circle cx="50" cy="400" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="850" cy="50" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="750" cy="380" r="80" fill="rgba(255,255,255,0.03)"/>

  <!-- Left side: Madagascar flag accent + title -->
  <g transform="translate(50, 80)">
    <!-- Mini Madagascar flag -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="20" height="60" fill="#ffffff"/>
      <rect x="20" y="0" width="40" height="30" fill="url(#redGrad)"/>
      <rect x="20" y="30" width="40" height="30" fill="url(#greenGrad)"/>
    </g>

    <!-- Title -->
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">
      Rapports Comptabilité
    </text>
    <text x="0" y="170" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">
      Malagasy · PCG 2005
    </text>
    <text x="0" y="205" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.9)">
      Déclaration TVA · Bilan · Compte de Résultat par Nature
    </text>

    <!-- Features list -->
    <g transform="translate(0, 240)" fill="white" font-family="Arial, sans-serif" font-size="15">
      <g transform="translate(0, 0)">
        <circle cx="8" cy="-5" r="6" fill="#FC3D32"/>
        <text x="22" y="0">Déclaration TVA Madagascar (sections A·B·C·D)</text>
      </g>
      <g transform="translate(0, 26)">
        <circle cx="8" cy="-5" r="6" fill="#007E3A"/>
        <text x="22" y="0">Bilan PCG 2005 — Actif / Capitaux propres &amp; Passifs</text>
      </g>
      <g transform="translate(0, 52)">
        <circle cx="8" cy="-5" r="6" fill="#FC3D32"/>
        <text x="22" y="0">Compte de Résultat par nature — Production · Charges · Net</text>
      </g>
      <g transform="translate(0, 78)">
        <circle cx="8" cy="-5" r="6" fill="#007E3A"/>
        <text x="22" y="0">Community &amp; Enterprise · Odoo 17 → 19</text>
      </g>
    </g>
  </g>

  <!-- Right side: Stylized report card with bar chart + KPI -->
  <g transform="translate(530, 80)" filter="url(#shadow)">
    <!-- Card -->
    <rect x="0" y="0" width="320" height="290" rx="10" ry="10" fill="url(#cardGrad)"/>

    <!-- Header -->
    <rect x="0" y="0" width="320" height="40" rx="10" ry="10" fill="#714B67"/>
    <rect x="0" y="20" width="320" height="20" fill="#714B67"/>
    <text x="20" y="27" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Déclaration TVA
    </text>
    <text x="300" y="27" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="end">
      Avril 2026
    </text>

    <!-- KPI rows -->
    <g font-family="Arial, sans-serif" font-size="13">
      <!-- A1 CA local -->
      <rect x="14" y="55" width="6" height="18" fill="#714B67" rx="2"/>
      <text x="28" y="68" fill="#333">A1. CA local taxable</text>
      <text x="306" y="68" fill="#714B67" text-anchor="end" font-weight="bold">1 000 000</text>

      <!-- A2 export -->
      <rect x="14" y="80" width="6" height="18" fill="#9C6B8E" rx="2"/>
      <text x="28" y="93" fill="#333">A2. CA exportation 0 %</text>
      <text x="306" y="93" fill="#714B67" text-anchor="end" font-weight="bold">800 000</text>

      <!-- B1 TVA collectée -->
      <rect x="14" y="105" width="6" height="18" fill="#FC3D32" rx="2"/>
      <text x="28" y="118" fill="#333">B1. TVA collectée 20 %</text>
      <text x="306" y="118" fill="#FC3D32" text-anchor="end" font-weight="bold">+ 200 000</text>

      <!-- C2 TVA déductible -->
      <rect x="14" y="130" width="6" height="18" fill="#007E3A" rx="2"/>
      <text x="28" y="143" fill="#333">C2. TVA déduct. B&amp;S</text>
      <text x="306" y="143" fill="#007E3A" text-anchor="end" font-weight="bold">- 100 000</text>

      <!-- C4 immo -->
      <rect x="14" y="155" width="6" height="18" fill="#007E3A" rx="2"/>
      <text x="28" y="168" fill="#333">C4. TVA déduct. immo</text>
      <text x="306" y="168" fill="#007E3A" text-anchor="end" font-weight="bold">- 400 000</text>

      <!-- Separator -->
      <line x1="14" y1="183" x2="306" y2="183" stroke="#e0e0e0" stroke-width="1"/>

      <!-- Total -->
      <text x="20" y="205" fill="#1E1E1E" font-weight="bold" font-size="14">D. TVA à décaisser</text>
      <text x="306" y="205" fill="#007E3A" text-anchor="end" font-weight="bold" font-size="14">- 300 000 MGA</text>
      <text x="306" y="220" fill="#9C6B8E" text-anchor="end" font-size="10" font-style="italic">crédit reportable</text>
    </g>

    <!-- Mini bar chart at bottom -->
    <g transform="translate(20, 240)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#9C6B8E">Évolution mensuelle</text>
      <g transform="translate(0, 8)">
        <rect x="0"   y="22" width="18" height="18" rx="2" fill="url(#barGreen)" opacity="0.7"/>
        <rect x="24"  y="14" width="18" height="26" rx="2" fill="url(#barRed)" opacity="0.7"/>
        <rect x="48"  y="6"  width="18" height="34" rx="2" fill="url(#barGreen)" opacity="0.85"/>
        <rect x="72"  y="2"  width="18" height="38" rx="2" fill="url(#barRed)"/>
        <rect x="96"  y="10" width="18" height="30" rx="2" fill="url(#barGreen)" opacity="0.85"/>
        <rect x="120" y="0"  width="18" height="40" rx="2" fill="url(#barGreen)"/>
        <rect x="144" y="6"  width="18" height="34" rx="2" fill="url(#barRed)" opacity="0.85"/>
        <rect x="168" y="14" width="18" height="26" rx="2" fill="url(#barRed)" opacity="0.7"/>
        <rect x="192" y="2"  width="18" height="38" rx="2" fill="url(#barGreen)"/>
        <rect x="216" y="8"  width="18" height="32" rx="2" fill="url(#barGreen)" opacity="0.85"/>
        <rect x="240" y="22" width="18" height="18" rx="2" fill="url(#barRed)" opacity="0.7"/>
        <rect x="264" y="14" width="18" height="26" rx="2" fill="url(#barRed)"/>
      </g>
    </g>
  </g>

  <!-- Bottom: SofteamG signature -->
  <g transform="translate(50, 410)" fill="rgba(255,255,255,0.7)"
     font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="14">by SofteamG · LGPL-3 · Conforme PCG 2005 · Hoby RASAMIMISA</text>
  </g>
</svg>
