  - id: dossier_precredit-003
    title: Générer l'échéancier prévisionnel avant soumission
    category: Instruction du dossier crédit
    difficulty: beginner
    roles:
      - agent_credit
      - gestionnaire
    suggested: false
    priority: 45
    questions:
      - Comment générer l'échéancier prévisionnel d'un crédit avant de le soumettre ?
    menu: >
      Microfinance > Crédits > Demande de crédit, bouton Générer échéancier
      dans l'en-tête de la fiche crédit.
    model: microfinance.loan
    prerequisites:
      - Une périodicité de remboursement (repayment_frequency_id) doit être choisie avant de pouvoir générer l'échéancier.
    steps:
      - Depuis la fiche crédit, cliquer sur le bouton Générer échéancier (action_generate_schedule).
      - Le bouton reste disponible tant que l'état est draft, submitted, manager_validated, finance_validated ou approved (avant activation).
    errors: >
      « Choisissez une périodicité de remboursement avant de générer l'échéancier. » si
      repayment_frequency_id n'est pas renseigné. « Échéancier autorisé avant activation
      seulement. » si l'état du crédit est en dehors de draft à approved.
    tips: >
      Générer l'échéancier prévisionnel avant soumission permet de visualiser l'impact
      réel de la durée (term) et de la périodicité (repayment_frequency_id) choisies,
      plutôt que de le découvrir après approbation.
    answer: >
      <p>Le bouton <strong>Générer échéancier</strong> sur la fiche crédit calcule un
      échéancier prévisionnel à partir du montant, de la durée et de la périodicité de
      remboursement choisis. Il reste disponible à toutes les étapes du cycle avant
      l'activation (brouillon, soumis, validé manager, validé finance, approuvé), ce qui
      permet de le régénérer si les paramètres du crédit changent.</p>
    keywords:
      - échéancier
      - action_generate_schedule
      - périodicité
    source_reference: microfinance_loan_management
    see_also:
      - dossier_precredit-001

  - id: dossier_precredit-004
    title: Qualifier une fiche client — type, identification et catégories de classification
    category: Qualification client
    difficulty: beginner
    roles:
      - agent_credit
      - gestionnaire
    suggested: true
    priority: 80
    questions:
      - Comment corriger une erreur de format sur le NIF ou le CIN d'un client ?
    menu: >
      Microfinance > Clients (menu_clients_root, action action_microfinance_client) —
      géré directement dans le formulaire partenaire (res.partner) ; aucun menu séparé
      n'existe pour microfinance.client.category.
    model: microfinance.client.category
    prerequisites:
      - La société (agence, company_id) est obligatoire pour un client créé en contexte microfinance.
    steps:
      - Ouvrir ou créer une fiche client via Microfinance > Clients.
      - Choisir le type de client (microfinance_client_type : Particulier / Société / Groupe, widget radio), qui pilote l'affichage des blocs de champs spécifiques.
      - Renseigner les champs d'identification du bloc correspondant (microfinance_id_type / microfinance_id_number pour un particulier, microfinance_nif pour une société, etc.).
      - Affecter jusqu'à 3 catégories de classification (microfinance_category_1/2/3) depuis microfinance.client.category.
    errors: >
      « La société (agence) est obligatoire pour un client microfinance. » — création ou
      modification sans company_id en contexte microfinance. « Le numéro de CIN doit
      contenir exactement 12 chiffres. » — si microfinance_id_type = cin et que le numéro
      ne contient pas exactement 12 chiffres (caractères non numériques ignorés dans le
      comptage). « Le NIF doit contenir exactement 12 chiffres. » — pour un client de type
      société (company).
    tips: >
      Compléter les catégories de classification et les données d'identité dès la création
      de la fiche client : les contraintes de format CIN/NIF ne se déclenchent qu'à
      l'enregistrement de la fiche, pas à la soumission d'un crédit.
    answer: >
      <p>Depuis <strong>Microfinance &gt; Clients</strong>, chaque fiche client précise un
      type (Particulier, Société ou Groupe) qui affiche les blocs de champs correspondants.
      Le numéro de CIN d'un particulier doit contenir exactement 12 chiffres, et le NIF
      d'une société également, sinon l'enregistrement échoue avec une erreur de validation.
      Jusqu'à 3 catégories de classification (microfinance_category_1/2/3) peuvent être
      affectées à chaque client depuis ces mêmes listes éditables du formulaire partenaire.</p>
    keywords:
      - client
      - catégorie
      - CIN
      - NIF
      - type de client
    source_reference: microfinance_loan_management
    see_also:
      - dossier_precredit-001

  - id: dossier_precredit-005
    title: Gérer la liste noire d'un client
    category: Qualification client
    difficulty: beginner
    roles:
      - agent_credit
      - gestionnaire
    suggested: true
    priority: 70
    questions:
      - Comment ajouter un client à la liste noire ?
      - Le système bloque-t-il automatiquement les crédits pour un client blacklisté ?
    menu: >
      Microfinance > Clients — liste éditable Liste noire (microfinance_blacklist_ids)
      dans le formulaire partenaire ; aucun menu séparé n'existe pour
      microfinance.client.blacklist.
    model: microfinance.client.blacklist
    steps:
      - Ouvrir la fiche du client concerné via Microfinance > Clients.
      - Ajouter une ligne dans Liste noire (microfinance_blacklist_ids) avec un motif (reason) et des dates de début/fin (date_start, date_end).
    tips: >
      Vérifier microfinance_is_blacklisted sur la fiche client avant de soumettre un
      crédit : le champ existe et est visible, mais sa vérification reste manuelle à ce
      jour — il n'empêche pas en lui-même la création ou la soumission d'un crédit pour le
      client concerné.
    answer: >
      <p>Une entrée de liste noire s'ajoute directement sur la fiche client, dans la liste
      éditable <strong>Liste noire</strong>, avec un motif et des dates de début/fin. Le
      champ calculé microfinance_is_blacklisted passe automatiquement à vrai si au moins
      une entrée est active et non expirée (date de fin vide ou postérieure ou égale à
      aujourd'hui). Ce champ est purement informatif : il n'existe aucun contrôle
      automatique qui bloque la création ou la soumission d'un crédit pour un client
      blacklisté ; la vérification reste manuelle.</p>
    keywords:
      - liste noire
      - blacklist
      - is_blacklisted
    source_reference: microfinance_loan_management
    see_also:
      - dossier_precredit-004

  - id: dossier_precredit-006
    title: Représentants (comité) et membres de groupe d'un client
    category: Qualification client
    difficulty: beginner
    roles:
      - agent_credit
      - gestionnaire
    suggested: false
    priority: 60
    questions:
      - Où gérer les représentants d'une société ou d'un groupe de clients ?
    menu: >
      Microfinance > Clients — listes éditables Comité (microfinance_representative_ids)
      et Membres du groupe (microfinance_member_ids) dans le formulaire partenaire
      (société/groupe) ; aucun menu séparé n'existe pour microfinance.client.representative
      ou microfinance.client.group.member.
    model: microfinance.client.representative, microfinance.client.group.member
    steps:
      - Ouvrir la fiche du client de type Société ou Groupe.
      - Ajouter des lignes dans Comité (microfinance_representative_ids), disponible pour les clients de type société ou groupe.
      - Pour un client de type Groupe, ajouter aussi des lignes dans Membres du groupe (microfinance_member_ids), avec les champs income et planned_periodic_savings.
    tips: >
      Pour les clients de type Groupe, renseigner systématiquement
      microfinance_member_ids (avec income et planned_periodic_savings) : ce sont les
      seules données structurées disponibles sur les membres du groupe.
    answer: >
      <p>Le Comité (microfinance_representative_ids) se renseigne directement sur la fiche
      client pour un client de type Société ou Groupe : il permet d'y ajouter les
      représentants légaux (président, etc.). Pour un client de type Groupe uniquement, la
      liste Membres du groupe (microfinance_member_ids) permet de détailler les membres
      individuels avec leurs revenus et leur épargne périodique planifiée. Ces deux listes
      sont embarquées dans le formulaire partenaire, sans menu dédié.</p>
    keywords:
      - représentants
      - comité
      - membres du groupe
    source_reference: microfinance_loan_management
    see_also:
      - dossier_precredit-004
