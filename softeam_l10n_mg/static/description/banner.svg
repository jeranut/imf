<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#714B67"/>
      <stop offset="50%" style="stop-color:#875A7B"/>
      <stop offset="100%" style="stop-color:#9C6B8E"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FC3D32"/>
      <stop offset="100%" style="stop-color:#D81E05"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#007E3A"/>
      <stop offset="100%" style="stop-color:#005C2A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgGrad)"/>
  <circle cx="50" cy="400" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="850" cy="50" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="750" cy="380" r="80" fill="rgba(255,255,255,0.03)"/>

  <!-- Left side: Madagascar flag accent + title -->
  <g transform="translate(50, 80)">
    <!-- Mini Madagascar flag -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="20" height="60" fill="#ffffff"/>
      <rect x="20" y="0" width="40" height="30" fill="url(#redGrad)"/>
      <rect x="20" y="30" width="40" height="30" fill="url(#greenGrad)"/>
    </g>

    <!-- Title -->
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">
      Madagascar
    </text>
    <text x="0" y="170" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">
      PCG 2005
    </text>
    <text x="0" y="205" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)">
      Plan Comptable Général Malagasy · Localisation Odoo
    </text>

    <!-- Features list -->
    <g transform="translate(0, 240)" fill="white" font-family="Arial, sans-serif" font-size="15">
      <g transform="translate(0, 0)">
        <circle cx="8" cy="-5" r="6" fill="#FC3D32"/>
        <text x="22" y="0">468 comptes officiels (décret n°2004-272)</text>
      </g>
      <g transform="translate(0, 26)">
        <circle cx="8" cy="-5" r="6" fill="#007E3A"/>
        <text x="22" y="0">TVA 20 % collectée / déductible / export 0 %</text>
      </g>
      <g transform="translate(0, 52)">
        <circle cx="8" cy="-5" r="6" fill="#FC3D32"/>
        <text x="22" y="0">Positions fiscales : assujetti / non-assujetti / export</text>
      </g>
      <g transform="translate(0, 78)">
        <circle cx="8" cy="-5" r="6" fill="#007E3A"/>
        <text x="22" y="0">Community &amp; Enterprise · Odoo 16 → 19 · MGA</text>
      </g>
    </g>
  </g>

  <!-- Right side: Stylized chart of accounts -->
  <g transform="translate(530, 80)" filter="url(#shadow)">
    <!-- Card -->
    <rect x="0" y="0" width="320" height="290" rx="10" ry="10" fill="url(#cardGrad)"/>

    <!-- Header -->
    <rect x="0" y="0" width="320" height="40" rx="10" ry="10" fill="#714B67"/>
    <rect x="0" y="20" width="320" height="20" fill="#714B67"/>
    <text x="20" y="27" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Plan Comptable
    </text>
    <text x="280" y="27" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="end">
      Madagascar
    </text>

    <!-- Class header bars: 1 to 7 -->
    <g font-family="Courier, monospace" font-size="13" font-weight="bold">
      <!-- Class 1 (Capital) -->
      <rect x="14" y="55" width="40" height="22" rx="3" fill="#714B67"/>
      <text x="34" y="71" fill="white" text-anchor="middle">101</text>
      <text x="62" y="71" fill="#333">Capital</text>
      <text x="280" y="71" fill="#9C6B8E" text-anchor="end">101000</text>

      <!-- Class 2 (Immo) -->
      <rect x="14" y="85" width="40" height="22" rx="3" fill="#28a745"/>
      <text x="34" y="101" fill="white" text-anchor="middle">213</text>
      <text x="62" y="101" fill="#333">Constructions</text>
      <text x="280" y="101" fill="#9C6B8E" text-anchor="end">213000</text>

      <!-- Class 4 - receivable -->
      <rect x="14" y="115" width="40" height="22" rx="3" fill="#FC3D32"/>
      <text x="34" y="131" fill="white" text-anchor="middle">4111</text>
      <text x="62" y="131" fill="#333">Clients Malagasy</text>
      <text x="280" y="131" fill="#9C6B8E" text-anchor="end">411100</text>

      <!-- Class 4 - payable -->
      <rect x="14" y="145" width="40" height="22" rx="3" fill="#FC3D32"/>
      <text x="34" y="161" fill="white" text-anchor="middle">4011</text>
      <text x="62" y="161" fill="#333">Fournisseurs MG</text>
      <text x="280" y="161" fill="#9C6B8E" text-anchor="end">401100</text>

      <!-- Class 4 - VAT -->
      <rect x="14" y="175" width="40" height="22" rx="3" fill="#9C6B8E"/>
      <text x="34" y="191" fill="white" text-anchor="middle">4451</text>
      <text x="62" y="191" fill="#333">TVA collectée 20%</text>
      <text x="280" y="191" fill="#9C6B8E" text-anchor="end">445100</text>

      <!-- Class 5 - Cash MGA -->
      <rect x="14" y="205" width="40" height="22" rx="3" fill="#007E3A"/>
      <text x="34" y="221" fill="white" text-anchor="middle">5311</text>
      <text x="62" y="221" fill="#333">Caisse en MGA</text>
      <text x="280" y="221" fill="#9C6B8E" text-anchor="end">531100</text>

      <!-- Class 7 - Sales -->
      <rect x="14" y="235" width="40" height="22" rx="3" fill="#714B67"/>
      <text x="34" y="251" fill="white" text-anchor="middle">707</text>
      <text x="62" y="251" fill="#333">Ventes marchandises</text>
      <text x="280" y="251" fill="#9C6B8E" text-anchor="end">707000</text>
    </g>

    <!-- Footer line -->
    <rect x="14" y="270" width="292" height="2" fill="#e0e0e0"/>
    <text x="160" y="285" font-family="Arial, sans-serif" font-size="10"
          fill="#9C6B8E" text-anchor="middle" font-style="italic">
      … 461 autres comptes (Annexe I PCG 2005)
    </text>
  </g>

  <!-- Bottom: SofteamG signature -->
  <g transform="translate(50, 410)" fill="rgba(255,255,255,0.7)"
     font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="14">by SofteamG · LGPL-3 · Décret n°2004-272 du 18 février 2004</text>
  </g>
</svg>
